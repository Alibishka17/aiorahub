<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — AI Ora Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/aiorahub.css">
</head>
<body class="aiora-app auth-page">
<main class="auth-shell">
    <a href="/" class="brand" aria-label="AI Ora Hub — главная">
        <span class="brand-name"><span class="brand-ai">AI</span><span>Ora</span><span class="brand-hub">Hub</span></span>
    </a>
    <section class="auth-panel">
        <div class="auth-heading">
            <span class="auth-kicker">Личный кабинет</span>
            <h1>Войти в кабинет</h1>
            <p>Используйте почту и пароль, указанные при регистрации.</p>
        </div>
        <div th:if="${error}" class="form-alert" th:text="${error}">Ошибка</div>
        <form th:action="@{/login}" method="post" class="app-form">
            <fieldset class="role-switch">
                <legend>Тип кабинета</legend>
                <label><input type="radio" name="role" value="CANDIDATE" th:checked="${selectedRole.name() == 'CANDIDATE'}"><span>Соискатель</span></label>
                <label><input type="radio" name="role" value="EMPLOYER" th:checked="${selectedRole.name() == 'EMPLOYER'}"><span>Работодатель</span></label>
            </fieldset>
            <div><label class="app-label" for="login-email">Электронная почта</label><input id="login-email" class="app-input" type="email" name="email" th:value="${email}" autocomplete="email" required></div>
            <div><label class="app-label" for="login-password">Пароль</label><input id="login-password" class="app-input" type="password" name="password" autocomplete="current-password" required></div>
            <button type="submit" class="button button--primary button--full">Войти</button>
        </form>
        <p class="auth-foot">Нет аккаунта? <a th:href="@{/register(role=${selectedRole})}">Создать личный кабинет</a></p>
    </section>
</main>
</body>
</html>
