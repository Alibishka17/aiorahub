<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-интервью — AI Ora Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/aiorahub.css">
</head>
<body class="aiora-app interview-page">
<header class="app-topbar">
    <a href="/" class="brand" aria-label="AI Ora Hub — главная">
        <span class="brand-name"><span class="brand-ai">AI</span><span>Ora</span><span class="brand-hub">Hub</span></span>
    </a>
    <span class="status">AI-интервью</span>
</header>
<main class="interview-shell">
    <div class="interview-heading">
        <span class="auth-kicker">Вакансия</span>
        <h1 th:text="${vacancy != null ? vacancy.title : 'AI-интервью'}">AI-интервью</h1>
        <p th:text="${guestApplication.guestName + ', ваши ответы будут переданы рекрутеру.'}">Ваши ответы будут переданы рекрутеру.</p>
    </div>
    <section class="interview-room">
        <div class="interview-participants">
            <div class="interview-person interview-person--ai"><span>AI</span><strong>AI-рекрутер AI Ora Hub</strong><small>готов к интервью</small></div>
            <div class="interview-person"><span th:text="${#strings.substring(guestApplication.guestFirstName, 0, 1)}">A</span><strong th:text="${guestApplication.guestName}">Кандидат</strong><small>участник</small></div>
        </div>
        <div class="interview-agenda">
            <strong>Структура интервью</strong>
            <ol>
                <li>Профессиональный опыт и ключевые навыки</li>
                <li>Соответствие требованиям вакансии</li>
                <li>Мотивация, язык и готовность к следующему этапу</li>
            </ol>
        </div>
        <form th:action="@{'/guest/interview/' + ${guestApplication.guestAccessToken} + '/complete'}" method="post">
            <button type="submit" class="button button--primary button--full">Завершить интервью и отправить отклик</button>
        </form>
    </section>
</main>
</body>
</html>
