<!DOCTYPE html>
<html lang="en" th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{guest.complete.title}">Application sent - AI Ora Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/aiorahub.css">
</head>
<body class="aiora-app auth-page">
<main class="auth-shell">
    <a href="/" class="brand" th:attr="aria-label=#{brand.home}">
        <span class="brand-name"><span class="brand-ai">AI</span><span>Ora</span><span class="brand-hub">Hub</span></span>
    </a>
    <div th:replace="~{fragments/language-switcher :: switcher}"></div>
    <section class="auth-panel completion-panel">
        <span class="completion-mark" th:text="#{guest.complete.mark}">Application sent</span>
        <h1 th:text="#{guest.complete.heading}">Application sent</h1>
        <p><span th:text="#{guest.complete.received}">The employer received your details for</span> <strong th:text="${vacancy != null ? vacancy.title : ''}">Vacancy</strong>.</p>
        <p><span th:text="#{guest.complete.contact}">The recruiter will contact you at</span> <strong th:text="${guestApplication.guestEmail}">email@example.com</strong>. <span th:text="#{guest.complete.interview}">AI interview will be available later.</span></p>
        <form th:if="${guestApplication.status.name() == 'APPLIED'}" th:action="@{'/guest/application/' + ${guestApplication.guestAccessToken} + '/interview'}" method="post">
            <button type="submit" class="button button--primary button--full" th:text="#{interview.start}">Start AI interview</button>
        </form>
        <a th:if="${guestApplication.externalInterviewUrl != null && guestApplication.status.name() == 'INTERVIEW_PENDING'}" th:href="${guestApplication.externalInterviewUrl}" class="button button--primary button--full" th:text="#{interview.continue}">Continue AI interview</a>
        <a href="/vacancies" class="button button--secondary button--full" th:text="#{guest.complete.back}">Back to vacancies</a>
    </section>
</main>
</body>
</html>
