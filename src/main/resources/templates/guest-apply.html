<!DOCTYPE html>
<html lang="en" th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{guest.title}">Apply - AI Ora Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/aiorahub.css">
</head>
<body class="aiora-app auth-page">
<main class="auth-shell auth-shell--wide">
    <a href="/" class="brand" th:attr="aria-label=#{brand.home}">
        <span class="brand-name"><span class="brand-ai">AI</span><span>Ora</span><span class="brand-hub">Hub</span></span>
    </a>
    <div th:replace="~{fragments/language-switcher :: switcher}"></div>
    <section class="auth-panel">
        <div class="auth-heading">
            <a th:href="@{'/vacancies/' + ${vacancy.id}}" class="header-back" th:text="#{guest.back}">Back to vacancy</a>
            <span class="auth-kicker" th:text="#{guest.kicker}">Apply without registration</span>
            <h1 th:text="${vacancy.title}">Вакансия</h1>
            <p th:text="#{guest.copy}">The employer will receive your details.</p>
        </div>
        <div th:if="${error}" class="form-alert" th:text="${error}">Ошибка</div>
        <form th:action="@{'/vacancies/' + ${vacancy.id} + '/apply'}" method="post" class="app-form">
            <div class="form-grid">
                <div><label class="app-label" for="first-name" th:text="#{form.first_name}">First name</label><input id="first-name" class="app-input" name="firstName" th:value="${firstName}" maxlength="100" autocomplete="given-name" required></div>
                <div><label class="app-label" for="last-name" th:text="#{form.last_name}">Last name</label><input id="last-name" class="app-input" name="lastName" th:value="${lastName}" maxlength="100" autocomplete="family-name" required></div>
            </div>
            <div>
                <label class="app-label" for="phone" th:text="#{form.phone}">Phone number</label>
                <input id="phone" class="app-input" type="tel" name="phone" th:value="${phone}" placeholder="+77001234567" pattern="\+[1-9][0-9]{7,14}" autocomplete="tel" required>
                <div class="contact-options" th:attr="aria-label=#{form.messengers}">
                    <label><input type="checkbox" name="telegramEnabled" value="true" th:checked="${telegramEnabled}"> Telegram</label>
                    <label><input type="checkbox" name="whatsappEnabled" value="true" th:checked="${whatsappEnabled}"> WhatsApp</label>
                </div>
                <small class="field-hint" th:text="#{form.phone_hint}">International format only.</small>
            </div>
            <div><label class="app-label" for="email" th:text="#{form.email}">Email</label><input id="email" class="app-input" type="email" name="email" th:value="${email}" maxlength="255" autocomplete="email" required><small class="field-hint" th:text="#{guest.email_hint}">The recruiter will use this email.</small></div>
            <button type="submit" class="button button--primary button--full" th:text="#{guest.submit}">Send application</button>
        </form>
        <p class="auth-foot"><span th:text="#{guest.want_account}">Need history and CV?</span> <a href="/register?role=CANDIDATE" th:text="#{guest.create}">Create account</a></p>
    </section>
</main>
</body>
</html>
