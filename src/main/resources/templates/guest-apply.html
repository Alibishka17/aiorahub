<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отклик на вакансию — AI Ora Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/aiorahub.css">
</head>
<body class="aiora-app auth-page">
<main class="auth-shell auth-shell--wide">
    <a href="/" class="brand" aria-label="AI Ora Hub — главная">
        <span class="brand-name"><span class="brand-ai">AI</span><span>Ora</span><span class="brand-hub">Hub</span></span>
    </a>
    <section class="auth-panel">
        <div class="auth-heading">
            <a th:href="@{'/vacancies/' + ${vacancy.id}}" class="header-back">Назад к вакансии</a>
            <span class="auth-kicker">Отклик без регистрации</span>
            <h1 th:text="${vacancy.title}">Вакансия</h1>
            <p>После отправки откроется интервью. Аккаунт и личный кабинет не создаются.</p>
        </div>
        <div th:if="${error}" class="form-alert" th:text="${error}">Ошибка</div>
        <form th:action="@{'/vacancies/' + ${vacancy.id} + '/apply'}" method="post" class="app-form">
            <div class="form-grid">
                <div><label class="app-label" for="first-name">Имя</label><input id="first-name" class="app-input" name="firstName" th:value="${firstName}" maxlength="100" autocomplete="given-name" required></div>
                <div><label class="app-label" for="last-name">Фамилия</label><input id="last-name" class="app-input" name="lastName" th:value="${lastName}" maxlength="100" autocomplete="family-name" required></div>
            </div>
            <div>
                <label class="app-label" for="phone">Номер телефона</label>
                <input id="phone" class="app-input" type="tel" name="phone" th:value="${phone}" placeholder="+77001234567" pattern="\+[1-9][0-9]{7,14}" autocomplete="tel" required>
                <div class="contact-options" aria-label="Мессенджеры на этом номере">
                    <label><input type="checkbox" name="telegramEnabled" value="true" th:checked="${telegramEnabled}"> Telegram</label>
                    <label><input type="checkbox" name="whatsappEnabled" value="true" th:checked="${whatsappEnabled}"> WhatsApp</label>
                </div>
                <small class="field-hint">Только международный формат: знак + и код страны.</small>
            </div>
            <div><label class="app-label" for="email">Электронная почта</label><input id="email" class="app-input" type="email" name="email" th:value="${email}" maxlength="255" autocomplete="email" required><small class="field-hint">Рекрутер использует эту почту, чтобы сообщить решение.</small></div>
            <button type="submit" class="button button--primary button--full">Продолжить к интервью</button>
        </form>
        <p class="auth-foot">Нужны история откликов и CV? <a href="/register?role=CANDIDATE">Создать кабинет</a></p>
    </section>
</main>
</body>
</html>
