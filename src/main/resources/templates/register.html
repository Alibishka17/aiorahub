<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — AI Ora Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/aiorahub.css">
</head>
<body class="aiora-app auth-page">
<main class="auth-shell auth-shell--wide">
    <a href="/" class="brand" aria-label="AI Ora Hub — главная">
        <span class="brand-name"><span class="brand-ai">AI</span><span>Ora</span><span class="brand-hub">Hub</span></span>
    </a>
    <section class="auth-panel">
        <div class="auth-heading">
            <span class="auth-kicker">Регистрация</span>
            <h1>Создать личный кабинет</h1>
            <p>Выберите роль. После регистрации откроется соответствующее рабочее пространство.</p>
        </div>
        <div th:if="${error}" class="form-alert" th:text="${error}">Ошибка</div>
        <form th:action="@{/register}" method="post" class="app-form">
            <fieldset class="role-switch">
                <legend>Кто вы?</legend>
                <label><input type="radio" name="role" value="CANDIDATE" th:checked="${selectedRole.name() == 'CANDIDATE'}"><span>Соискатель</span></label>
                <label><input type="radio" name="role" value="EMPLOYER" th:checked="${selectedRole.name() == 'EMPLOYER'}"><span>Работодатель</span></label>
            </fieldset>
            <div class="form-grid">
                <div><label class="app-label" for="first-name">Имя</label><input id="first-name" class="app-input" name="firstName" th:value="${firstName}" autocomplete="given-name" required></div>
                <div><label class="app-label" for="last-name">Фамилия</label><input id="last-name" class="app-input" name="lastName" th:value="${lastName}" autocomplete="family-name" required></div>
            </div>
            <div>
                <label class="app-label" for="phone">Номер телефона</label>
                <input id="phone" class="app-input" type="tel" name="phone" th:value="${phone}" placeholder="+77001234567" pattern="\+[1-9][0-9]{7,14}" autocomplete="tel" required>
                <div class="contact-options" aria-label="Мессенджеры на этом номере">
                    <label><input type="checkbox" name="telegramEnabled" value="true" th:checked="${telegramEnabled}"> Telegram</label>
                    <label><input type="checkbox" name="whatsappEnabled" value="true" th:checked="${whatsappEnabled}"> WhatsApp</label>
                </div>
                <small class="field-hint">Только международный формат: знак + и код страны.</small>
            </div>
            <div><label class="app-label" for="register-email">Электронная почта</label><input id="register-email" class="app-input" type="email" name="email" th:value="${email}" autocomplete="email" required></div>
            <div><label class="app-label" for="register-password">Пароль</label><input id="register-password" class="app-input" type="password" name="password" minlength="8" autocomplete="new-password" required><small class="field-hint">Минимум 8 символов.</small></div>
            <button type="submit" class="button button--primary button--full">Создать кабинет</button>
        </form>
        <p class="auth-foot">Уже зарегистрированы? <a th:href="@{/login(role=${selectedRole})}">Войти</a></p>
    </section>
</main>
</body>
</html>
