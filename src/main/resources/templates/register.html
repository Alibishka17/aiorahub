<!DOCTYPE html>
<html lang="en" th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{register.title}">Registration - AIOraHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/aiorahub.css">
</head>
<body class="aiora-app auth-page">
<main class="auth-shell auth-shell--wide">
    <a href="/" class="brand" th:attr="aria-label=#{brand.home}">
        <span class="brand-name"><span class="brand-ai">AI</span><span>Ora</span><span class="brand-hub">Hub</span></span>
    </a>
    <div th:replace="~{fragments/language-switcher :: switcher}"></div>
    <section class="auth-panel">
        <div class="auth-heading">
            <span class="auth-kicker" th:text="#{register.kicker}">Registration</span>
            <h1 th:text="#{register.heading}">Create account</h1>
            <p th:text="#{register.copy}">Choose a role.</p>
        </div>
        <div th:if="${error}" class="form-alert" th:text="${error}">Ошибка</div>
        <form th:action="@{/register}" method="post" class="app-form">
            <fieldset class="role-switch">
                <legend th:text="#{register.who}">Who are you?</legend>
                <label><input type="radio" name="role" value="CANDIDATE" th:checked="${selectedRole.name() == 'CANDIDATE'}"><span th:text="#{role.candidate}">Candidate</span></label>
                <label><input type="radio" name="role" value="EMPLOYER" th:checked="${selectedRole.name() == 'EMPLOYER'}"><span th:text="#{role.employer}">Employer</span></label>
            </fieldset>
            <div class="form-grid">
                <div><label class="app-label" for="first-name" th:text="#{form.first_name}">First name</label><input id="first-name" class="app-input" name="firstName" th:value="${firstName}" autocomplete="given-name" required></div>
                <div><label class="app-label" for="last-name" th:text="#{form.last_name}">Last name</label><input id="last-name" class="app-input" name="lastName" th:value="${lastName}" autocomplete="family-name" required></div>
            </div>
            <div>
                <label class="app-label" for="phone" th:text="#{form.phone}">Phone number</label>
                <input id="phone" class="app-input" type="tel" name="phone" th:value="${phone}" placeholder="+77001234567" pattern="\+[1-9][0-9]{7,14}" autocomplete="tel" required>
                <div class="contact-options" th:attr="aria-label=#{form.messengers}">
                    <label><input type="checkbox" name="telegramEnabled" value="true" th:checked="${telegramEnabled}"> Telegram</label>
                    <label><input type="checkbox" name="whatsappEnabled" value="true" th:checked="${whatsappEnabled}"> WhatsApp</label>
                </div>
                <small class="field-hint" th:text="#{form.phone_hint}">International format only.</small>
            </div>
            <div><label class="app-label" for="register-email" th:text="#{form.email}">Email</label><input id="register-email" class="app-input" type="email" name="email" th:value="${email}" autocomplete="email" required></div>
            <div><label class="app-label" for="register-password" th:text="#{form.password}">Password</label><input id="register-password" class="app-input" type="password" name="password" minlength="8" autocomplete="new-password" required><small class="field-hint" th:text="#{form.password_hint}">At least 8 characters.</small></div>
            <button type="submit" class="button button--primary button--full" th:text="#{register.submit}">Create account</button>
        </form>
        <p class="auth-foot"><span th:text="#{register.existing}">Already registered?</span> <a th:href="@{/login(role=${selectedRole})}" th:text="#{register.sign_in}">Sign in</a></p>
    </section>
</main>
</body>
</html>
