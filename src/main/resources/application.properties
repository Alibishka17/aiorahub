spring.application.name=AIOraHub
server.port=8080
server.address=127.0.0.1

# Local development uses a persistent H2 file. Production overrides this with PostgreSQL.
spring.datasource.url=jdbc:h2:file:./data/aiorahub;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=true

spring.h2.console.enabled=false

spring.thymeleaf.cache=false
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
app.upload-dir=./data/uploads
app.admin.username=${ADMIN_USERNAME:Admin}
app.admin.password-hash=${ADMIN_PASSWORD_HASH:}
app.hrme.base-url=${HRME_BASE_URL:https://hrme.ai}
app.hrme.service-token=${HRME_SERVICE_TOKEN:}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB
server.servlet.session.tracking-modes=cookie
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=24h
server.servlet.session.cookie.max-age=24h
spring.session.store-type=jdbc
spring.session.timeout=24h
spring.session.jdbc.initialize-schema=always
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
