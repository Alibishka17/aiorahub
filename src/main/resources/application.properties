spring.application.name=AI Ora Hub
server.port=8080
server.address=127.0.0.1

# Local development uses a persistent H2 file. Production overrides this with PostgreSQL.
spring.datasource.url=jdbc:h2:file:./data/aiorahub;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=true

spring.h2.console.enabled=false

spring.thymeleaf.cache=false
app.upload-dir=./data/uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB
server.servlet.session.tracking-modes=cookie
server.servlet.session.cookie.same-site=lax
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
