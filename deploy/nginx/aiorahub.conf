server {
    listen 80;
    listen [::]:80;
    server_name aiorahub.com www.aiorahub.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://aiorahub.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aiorahub.com www.aiorahub.com;

    ssl_certificate /etc/letsencrypt/live/aiorahub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiorahub.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    if ($host = www.aiorahub.com) {
        return 301 https://aiorahub.com$request_uri;
    }

    client_max_body_size 11m;
    error_page 413 =303 /candidate/documents?uploadTooLarge=true;

    location = /h2-console {
        return 404;
    }

    location ^~ /h2-console/ {
        return 404;
    }

    location ~ /\. {
        deny all;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}
